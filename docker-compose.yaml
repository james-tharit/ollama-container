services:
  ollama:
  # ollama/ollama:rocm for AMD hardware
    image: docker.io/ollama/ollama:rocm
    container_name: ollama-amd
    # Podman-specific: keeps your host's render/video group permissions
    group_add:
      - keep-groups
    # Podman-specific: prevents SELinux/AppArmor from blocking /dev/kfd
    security_opt:
      - label=disable
    # Linux-specific: find GPU
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    # For persist image
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Optional: Force a specific ROCm version if GPU is older
      # For RX6600
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    restart: unless-stopped